process_subdirs:
  - "."
  - "Образы"
  - "temp"
  - "*.part"

rules:
  - name: "Images"
    patterns:
      - ".*\\.(jpg|jpeg|png|gif|bmp|svg|webp|ico)$"
    mime_types:
      - "image/.*"
    destination: "~/Изображения"
    action: move
    conflict: rename

  - name: "Videos"
    patterns:
      - ".*\\.(mp4|avi|mkv|mov|wmv|flv|webm|m4v|mpg|mpeg)$"
    mime_types:
      - "video/.*"
    destination: "~/Видео"
    action: move
    conflict: rename

  - name: "Music"
    patterns:
      - ".*\\.(mp3|flac|wav|aac|ogg|m4a|wma|opus)$"
    mime_types:
      - "audio/.*"
    destination: "~/Музыка"
    action: move
    conflict: rename

  - name: "Documents"
    patterns:
      - ".*\\.(pdf|docx?|xlsx?|pptx?|txt|odt|ods|odp|rtf|md|txt)$"
    mime_types:
      - "application/pdf"
      - "application/msword"
      - "application/vnd.openxmlformats-officedocument.*"
      - "text/.*"
      - "application/vnd.oasis.opendocument.*"
    destination: "~/Документы"
    action: move
    conflict: rename

  - name: "Disk Images"
    patterns:
      - ".*\\.(iso|img|bin|cue|nrg|mdf|dmg)$"
    mime_types:
      - "application/x-iso9660-image"
      - "application/octet-stream"
    destination: "~/Загрузки/Образы"
    action: move
    conflict: rename

  - name: "Torrent files"
    patterns:
      - ".*\\.torrent$"
    mime_types:
      - "application/x-bittorrent"
    action: delete

  - name: "Archives"
    patterns:
      - ".*\\.(zip|tar\\.gz|tgz|rar|7z|gz|xz|bz2)$"
    mime_types:
      - "application/zip"
      - "application/x-tar"
      - "application/x-gzip"
      - "application/x-7z-compressed"
      - "application/x-bzip2"
      - "application/x-xz"
    action: move
    destination: "~/Загрузки/Архивы"
    conflict: rename

logging:
  file: "~/.local/share/dfsort/dfsort.log"
  level: info


